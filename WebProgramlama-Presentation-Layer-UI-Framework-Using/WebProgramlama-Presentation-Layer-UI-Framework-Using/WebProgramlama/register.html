<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(to right, #2c3e50, #4ca1af);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .register-card {
      width: 100%;
      max-width: 500px;
      padding: 2rem;
      background-color: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    .form-control:focus {
      border-color: #4ca1af;
      box-shadow: 0 0 0 0.2rem rgba(76, 161, 175, 0.25);
    }

    .btn-register {
      background-color: #4ca1af;
      border: none;
    }

    .btn-register:hover {
      background-color: #3b8b9c;
    }

    .text-muted a {
      color: #4ca1af;
      text-decoration: none;
    }

    .text-muted a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="register-card">
    <h4 class="text-center mb-4">Sign Up</h4>
    <form onsubmit="saveData(); return false;">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" placeholder="Username" required>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="mail@example.com" required>
      </div>

      <div class="mb-3">
        <label for="number" class="form-label">Phone Number</label>
        <input type="text" class="form-control" id="number" placeholder="e.g. +1234567890" required>
      </div>

      <div class="mb-3">
        <label for="gender" class="form-label">Gender</label>
        <select class="form-select" id="gender" required>
          <option value="" disabled selected>Select your gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="country" class="form-label">Country</label>
        <select class="form-select" id="country" required>
          <option value="" disabled selected>Select your country</option>
          <option value="usa">United States</option>
          <option value="uk">United Kingdom</option>
          <option value="tr">Turkey</option>
          <option value="de">Germany</option>
          <option value="fr">France</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="birthdate" class="form-label">Birthdate</label>
        <input type="date" class="form-control" id="birthdate" required>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Enter password" required>
      </div>

      <div class="mb-3">
        <label for="c_password" class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="c_password" placeholder="Re-enter password" required>
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-register text-white">Next Page (1/2)</button>
      </div>
    </form>

    <p class="mt-3 text-center text-muted">
      Already have an account? <a href="login.html">Login</a>
    </p>
  </div>

  <script>
    function saveData() {
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('c_password').value;

      if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return;
      }

      const userData = {
        userName: document.getElementById('username').value,
        userEmail: document.getElementById('email').value,
        userNumber: document.getElementById('number').value,
        userGender: document.getElementById('gender').value,
        userLocation: document.getElementById('country').value,
        userBirth: document.getElementById('birthdate').value,
        userPassword: password
      };
      localStorage.setItem('userData', JSON.stringify(userData));
      window.location.href = 'register2.html';
    }
  </script>

</body>
</html>
