<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Events</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(to right, #2c3e50, #4ca1af);
      min-height: 100vh;
      padding-top: 40px;
      padding-bottom: 40px;
    }

    .event-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .event-card {
      width: 100%;
      max-width: 350px;
    }

    .event-info.accepted {
      border: 2px solid #198754;
    }

    .event-info.declined {
      border: 2px solid #dc3545;
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .btn-group {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container text-center text-white">
    <h2 class="mb-4">User Events</h2>
    <h5 id="user-id" class="mb-3"></h5>
    <div id="events-container" class="event-container"></div>
    <p id="error-message" class="text-danger mt-3"></p>
  </div>

  <script>
    const userId = sessionStorage.getItem("selectedId");
    document.getElementById("user-id").innerText = "User ID: " + userId;

    async function fetchEvents() {
      try {
        const response = await fetch(`http://localhost:8080/api/events/getAllEventsByOwnerId/${userId}`);
        const events = await response.json();

        const container = document.getElementById('events-container');
        container.innerHTML = '';

        if (events.length === 0) {
          container.innerHTML = '<p class="text-white">No events found for this user.</p>';
          return;
        }

        events.forEach(event => {
          const eventDiv = document.createElement('div');
          eventDiv.classList.add('card', 'event-info', 'event-card', 'p-3', 'bg-light');
          eventDiv.setAttribute('id', `event-${event.eventId}`);
          eventDiv.innerHTML = `
            <div class="card-body">
              <h5 class="card-title">${event.eventName}</h5>
              <p class="card-text"><strong>ID:</strong> ${event.eventId}</p>
              <p class="card-text"><strong>Description:</strong> ${event.eventExplanation}</p>
              <p class="card-text"><strong>Date:</strong> ${new Date(event.eventDate).toLocaleDateString()}</p>
              <p class="card-text"><strong>Time:</strong> ${event.eventTime}</p>
              <p class="card-text"><strong>Duration:</strong> ${event.eventDuration} mins</p>
              <p class="card-text"><strong>Category:</strong> ${event.eventCategory}</p>
              <p class="card-text"><strong>Location:</strong> (${event.eventLocationX}, ${event.eventLocationY})</p>
              <div class="btn-group w-100">
                <button class="btn btn-success" onclick="acceptFunction(${event.eventId})">Accept</button>
                <button class="btn btn-danger" onclick="declineFunction(${event.eventId})">Decline</button>
              </div>
            </div>
          `;
          container.appendChild(eventDiv);
        });
      } catch (error) {
        console.error('Error fetching events:', error);
        document.getElementById('events-container').innerHTML = '<p class="text-white">Error loading events</p>';
      }
    }

    async function acceptFunction(eventId) {
      const eventDiv = document.getElementById(`event-${eventId}`);
      try {
        const response = await fetch(`http://localhost:8080/api/events/isAllowed/${eventId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ isAllowed: 'accept' })
        });

        if (!response.ok) {
          document.getElementById('error-message').innerText = 'Event could not be accepted!';
          return;
        }

        alert("Event Accepted");
        eventDiv.classList.remove('declined');
        eventDiv.classList.add('accepted');
      } catch (error) {
        document.getElementById('error-message').innerText = error.message;
      }
    }

    async function declineFunction(eventId) {
      const eventDiv = document.getElementById(`event-${eventId}`);
      try {
        const response = await fetch(`http://localhost:8080/api/events/isAllowed/${eventId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ isAllowed: 'decline' })
        });

        if (!response.ok) {
          document.getElementById('error-message').innerText = 'Event could not be declined!';
          return;
        }

        alert("Event Declined");
        eventDiv.classList.remove('accepted');
        eventDiv.classList.add('declined');
      } catch (error) {
        document.getElementById('error-message').innerText = error.message;
      }
    }

    window.onload = fetchEvents;
  </script>
</body>
</html>
