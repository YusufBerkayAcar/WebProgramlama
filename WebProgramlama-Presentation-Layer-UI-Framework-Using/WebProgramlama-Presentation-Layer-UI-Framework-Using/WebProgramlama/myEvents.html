<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Events - Event Application</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(135deg, #4ca1af, #2c3e50);
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    .container {
      margin: 1rem auto;
      max-width: 1200px;
      flex-grow: 1;
      display: flex;
      gap: 2rem;
    }

    .title {
      text-align: center;
      font-size: 2rem;
      font-weight: bold;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
      margin-top: 1rem;
    }

    .filter-buttons {
      text-align: center;
      margin-bottom: 1rem;
    }

    .filter-buttons button {
      margin: 0 0.5rem;
      padding: 0.5rem 1.2rem;
      border-radius: 50px;
      border: none;
      font-weight: 600;
      transition: all 0.3s ease;
      color: #fff;
      background-color: #4ca1af;
      cursor: pointer;
    }

    .filter-buttons button:hover,
    .filter-buttons button.active {
      background-color: #3b8b9c;
    }

    #map {
      flex: 1;
      min-height: 600px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    #response-container {
      flex: 1;
      overflow-y: auto;
      max-height: 600px;
      background-color: #ffffff1a;
      backdrop-filter: blur(8px);
      border-radius: 15px;
      padding: 1rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .event-box {
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #4ca1af;
    }

    .event-box h3 {
      margin-top: 0;
    }

    .event-box button {
      margin-right: 0.5rem;
      background-color: #4ca1af;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .event-box button:hover {
      background-color: #3b8b9c;
    }

    .d-none {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="title">My Events</div>

  <div class="filter-buttons">
    <button class="btn-filter active" onclick="filterEvents('all', this)">All</button>
    <button class="btn-filter" onclick="filterEvents('created', this)">Created</button>
    <button class="btn-filter" onclick="filterEvents('joined', this)">Joined</button>
  </div>

  <div class="container">
    <div id="response-container"></div>
    <div id="map"></div>
  </div>

  <script>
    let map;
    let markers = [];
    let infoWindow;

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 39.92077, lng: 32.85411 },
        zoom: 6,
      });
      infoWindow = new google.maps.InfoWindow();
    }

    async function sendEventOwnerId() {
    const userId = sessionStorage.getItem('userId');
    if (!userId) {
      alert("User ID not found in session storage.");
      return;
    }

    try {
      // 1. Oluşturduğun etkinlikleri çek
      const createdResponse = await fetch(`http://localhost:8080/api/events/getAllEventsByOwnerId2/${userId}`);
      if (!createdResponse.ok) throw new Error('Failed to fetch created events');
      const createdEvents = await createdResponse.json();

      // 2. Katıldığın etkinlikleri çek
      const joinedResponse = await fetch(`http://localhost:8080/api/participants/user/${userId}/events`);
      if (!joinedResponse.ok) throw new Error('Failed to fetch joined events');
      const joinedEventsRaw = await joinedResponse.json();

      // joinedEventsRaw içindeki eventCategory olmayabilir, o yüzden ekleyelim
      const joinedEvents = joinedEventsRaw.map(e => ({ ...e, eventCategory: 'joined' }));

      // createdEvents'in eventCategory sini de oluşturduğumuz gibi belirleyelim
      const createdEventsWithCategory = createdEvents.map(e => ({ ...e, eventCategory: 'created' }));

      // 3. İkisini birleştir
      const allEvents = [...createdEventsWithCategory, ...joinedEvents];

      // 4. Önce mevcut markerları temizle ve kutuyu boşalt
      const container = document.getElementById('response-container');
      container.innerHTML = '';
      markers.forEach(marker => marker.setMap(null));
      markers = [];

      // 5. Tüm etkinlikleri göster
      allEvents.forEach(event => {
        const marker = new google.maps.Marker({
          position: { lat: parseFloat(event.eventLocationX), lng: parseFloat(event.eventLocationY) },
          map: map,
          title: event.eventName,
          icon: event.eventCategory === 'joined' 
                ? 'http://maps.google.com/mapfiles/ms/icons/blue-dot.png'  // Katıldığın etkinlikler için mavi işaretçi
                : 'http://maps.google.com/mapfiles/ms/icons/red-dot.png'   // Oluşturduğun etkinlikler için kırmızı işaretçi
        });
        markers.push(marker);

        const box = document.createElement('div');
        box.classList.add('event-box');
        box.dataset.category = event.eventCategory || 'created';

        box.innerHTML = `
          <h3>${event.eventName}</h3>
          <p><strong>Description:</strong> ${event.eventExplanation}</p>
          <p><strong>Date:</strong> ${new Date(event.eventDate).toLocaleDateString()}</p>
          <p><strong>Time:</strong> ${event.eventTime}</p>
          <p><strong>Duration:</strong> ${event.eventDuration} mins</p>
          <p><strong>Category:</strong> ${event.eventCategory}</p>
          ${event.eventCategory === 'created' ? `
            <button onclick="goToUpdateEvent(${event.eventId})">Update</button>
            <button onclick="deleteEvent(${event.eventId})">Delete</button>
          ` : ''}
        `;

        container.appendChild(box);

        google.maps.event.addListener(marker, 'click', function () {
          const content = `
            <div>
              <h4>${event.eventName}</h4>
              <p><strong>Description:</strong> ${event.eventExplanation}</p>
              <p><strong>Date:</strong> ${new Date(event.eventDate).toLocaleDateString()}</p>
              <p><strong>Time:</strong> ${event.eventTime}</p>
              <p><strong>Duration:</strong> ${event.eventDuration} mins</p>
              <p><strong>Category:</strong> ${event.eventCategory}</p>
            </div>
          `;
          infoWindow.setContent(content);
          infoWindow.open(map, marker);
        });
      });
    } catch (error) {
      console.error(error);
      alert("Error loading events.");
    }
  }

    function goToUpdateEvent(eventId) {
      sessionStorage.setItem('eventId', eventId);
      window.location.href = "updateEvent.html";
    }

    async function deleteEvent(eventId) {
      try {
        const response = await fetch(`http://localhost:8080/api/events/deleteEvent/${eventId}`, {
          method: 'DELETE'
        });
        if (!response.ok) throw new Error('Delete failed');
        window.location.reload();
      } catch (error) {
        console.error(error);
        alert("Delete failed.");
      }
    }

    function filterEvents(type, btn) {
      const boxes = document.querySelectorAll('.event-box');
      boxes.forEach(box => {
        box.classList.remove('d-none');
        if (type === 'created' && box.dataset.category !== 'created') box.classList.add('d-none');
        if (type === 'joined' && box.dataset.category !== 'joined') box.classList.add('d-none');
      });
      document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    window.onload = function () {
      initMap();
      sendEventOwnerId();
    };
  </script>

<script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDq_TyhfgtGBbYTPBnRmJDT9vJ7Dz216iI&callback=initMap">
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
