<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Event Chat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(to right, #2c3e50, #4ca1af);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .chat-card {
      background-color: #ffffffcc;
      border-radius: 16px;
      width: 100%;
      max-width: 700px;
      padding: 1.5rem;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    .chat-header {
      font-size: 1.5rem;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 1rem;
      text-align: center;
    }

    .chat-box {
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 1rem;
      background-color: #f8f9fa;
      margin-bottom: 1rem;
    }

    .chat-message {
      margin-bottom: 1rem;
    }

    .chat-message strong {
      color: #2c3e50;
    }

    .chat-input {
      display: flex;
      gap: 0.5rem;
    }

    .chat-input input {
      flex: 1;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    .btn-send {
      background-color: #4ca1af;
      border: none;
      color: white;
      padding: 0 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-send:hover {
      background-color: #3b8b9c;
    }
  </style>
</head>
<body>

  <div class="chat-card">
    <div class="chat-header">Event Chat</div>

    <!-- Chat messages -->
    <div class="chat-box" id="chat-box">
      <!-- Backend'den mesajlar buraya yüklenecek -->
    </div>

    <!-- Message input -->
    <form id="chat-form" class="chat-input">
      <input type="text" id="message-input" class="form-control" placeholder="Type your message..." required />
      <button type="submit" class="btn btn-send">Send</button>
    </form>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const userId = params.get("userId");
    const eventId = params.get("eventId");
    const chatBox = document.getElementById("chat-box");
    const userName = sessionStorage.getItem("userName") || "Anonymous";

    function loadMessages() {
      fetch(`http://localhost:8080/api/messages/event/${eventId}`)
        .then(response => response.json())
        .then(messages => {
          chatBox.innerHTML = ""; 
          messages.forEach(message => {
            const messageDiv = document.createElement("div");
            messageDiv.classList.add("chat-message");
            // Tarih varsa göstermek isterseniz ekleyebilirsiniz
            messageDiv.innerHTML = `<strong>${message.userName}:</strong> ${message.message}`;
            chatBox.appendChild(messageDiv);
          });
          chatBox.scrollTop = chatBox.scrollHeight; // Scroll en sona
        })
        .catch(error => {
          console.error("Mesajlar yüklenirken hata oluştu:", error);
        });
    }

    function sendMessage() {
      const messageContent = document.getElementById("message-input").value;
      if (!messageContent.trim()) {
        alert("Mesaj boş olamaz!");
        return;
      }

      const messageData = {
        userId: parseInt(userId),
        eventId: parseInt(eventId),
        message: messageContent,
        userName: userName,
      };

      fetch("http://localhost:8080/api/messages/add", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify(messageData),
      })
      .then(response => {
        if (response.ok) {
          document.getElementById("message-input").value = ""; 
          loadMessages();
        } else {
          alert("Mesaj gönderilirken hata oluştu!");
        }
      })
      .catch(error => {
        console.error("Mesaj gönderilirken hata oluştu:", error);
      });
    }

    window.onload = function () {
      loadMessages();

      document.getElementById("chat-form").addEventListener("submit", function(event) {
        event.preventDefault();
        sendMessage();
      });
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
