<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Panel - Event Application</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(135deg, #2c3e50, #4ca1af);
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      padding-bottom: 2rem;
    }
    .container {
      margin-top: 3rem;
    }
    .admin-section {
      background-color: #ffffff22;
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 2rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      margin-bottom: 2rem;
      display: none;
    }
    .admin-section.active {
      display: block;
    }
    .user-info {
      background-color: #ffffff1a;
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1rem;
      color: #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .user-photo {
      width: 50px;
      height: 50px;
      background-size: cover;
      border-radius: 50%;
      margin-bottom: 1rem;
    }
    .field {
      font-weight: bold;
    }
    button {
      margin-right: 10px;
    }
    .btn-delete {
      background-color: #dc3545;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      color: #fff;
    }
    .btn-more {
      background-color: #4ca1af;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      color: #fff;
    }
    .filter-buttons {
      text-align: center;
      margin-bottom: 2rem;
    }
    .filter-buttons button {
      margin: 0 0.5rem;
      padding: 0.5rem 1.2rem;
      border-radius: 50px;
      border: none;
      font-weight: 600;
      transition: all 0.3s ease;
      color: #fff;
      background-color: #4ca1af;
    }
    .filter-buttons button:hover,
    .filter-buttons button.active {
      background-color: #3b8b9c;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="text-center mb-4">Admin Panel</h1>

    <!-- Filter Buttons -->
    <div class="filter-buttons">
      <button class="active" onclick="filter('all')">All</button>
      <button onclick="filter('users')">Users</button>
      <button onclick="filter('events')">Events</button>
    </div>

    <!-- Users Section -->
    <div id="usersSection" class="admin-section active">
      <h3>👤 Users</h3>
      <div id="users-container">
        <!-- Dinamik olarak JS ile kullanıcılar buraya yüklenecek -->
      </div>
    </div>

    <!-- Events Section -->
    <div id="eventsSection" class="admin-section active">
      <h3>📅 Events</h3>
      <ul class="list-group">
        <li class="list-group-item">
          Startup Pitch Day - San Francisco
          <div class="action-buttons">
            <button class="btn-edit" onclick="editItem('event', this)">Edit</button>
            <button class="btn-delete" onclick="removeEvent(this)">Delete</button>
          </div>
        </li>
        <li class="list-group-item">
          Music Fest - Los Angeles
          <div class="action-buttons">
            <button class="btn-edit" onclick="editItem('event', this)">Edit</button>
            <button class="btn-delete" onclick="removeEvent(this)">Delete</button>
          </div>
        </li>
        <li class="list-group-item">
          Tech Conference - New York
          <div class="action-buttons">
            <button class="btn-edit" onclick="editItem('event', this)">Edit</button>
            <button class="btn-delete" onclick="removeEvent(this)">Delete</button>
          </div>
        </li>
      </ul>
    </div>
  </div>

  <!-- JavaScript -->
  <script>
    async function fetchUsers() {
      try {
        const response = await fetch('http://localhost:8080/api/users/getAllUsers');
        const users = await response.json();

        const container = document.getElementById('users-container');
        container.innerHTML = '';

        users.forEach(user => {
          const userDiv = document.createElement('div');
          userDiv.classList.add('user-info');
          userDiv.innerHTML = `
            <h4>${user.userName}</h4>
            <div class="user-photo" style="background-image: url('chat.png');"></div>
            <p><span class="field">User ID:</span> ${user.userId}</p>
            <p><span class="field">Password:</span> ${user.userPassword}</p>
            <p><span class="field">Location:</span> ${user.userLocation}</p>
            <p><span class="field">Interests:</span> ${user.userInterests}</p>
            <p><span class="field">Birth Date:</span> ${new Date(user.userBirth).toLocaleDateString()}</p>
            <p><span class="field">Phone Number:</span> ${user.userNumber}</p>
            <button class="btn-more" onclick="goToMore(${user.userId})">MORE FOR USER</button>
            <button class="btn-delete" onclick="handleDelete(${user.userId})">DELETE USER</button>
          `;
          container.appendChild(userDiv);
        });
      } catch (error) {
        console.error('Error fetching users:', error);
        document.getElementById('users-container').innerHTML = '<p>Error loading users</p>';
      }
    }

    async function handleDelete(userId) {
      try {
        const response = await fetch(`http://localhost:8080/api/users/delete/${userId}`, {
          method: 'DELETE'
        });

        if (!response.ok) throw new Error('Kullanıcı silinemedi');

        console.log('Kullanıcı silindi:', await response.text());
        fetchUsers(); // sadece kullanıcı listesini yenile
      } catch (error) {
        console.error("Kullanıcı silme hatası:", error);
      }
    }

    function goToMore(userId) {
      sessionStorage.setItem("selectedId", userId);
      window.open(`allowPage.html`, "_blank");
    }

    function filter(type) {
      const usersSection = document.getElementById('usersSection');
      const eventsSection = document.getElementById('eventsSection');
      const buttons = document.querySelectorAll('.filter-buttons button');

      buttons.forEach(btn => btn.classList.remove('active'));

      if (type === 'all') {
        usersSection.classList.add('active');
        eventsSection.classList.add('active');
        buttons[0].classList.add('active');
      } else if (type === 'users') {
        usersSection.classList.add('active');
        eventsSection.classList.remove('active');
        buttons[1].classList.add('active');
      } else if (type === 'events') {
        usersSection.classList.remove('active');
        eventsSection.classList.add('active');
        buttons[2].classList.add('active');
      }
    }

    window.onload = fetchUsers;
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
