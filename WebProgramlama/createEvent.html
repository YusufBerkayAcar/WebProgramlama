<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create Event</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(to right, #2c3e50, #4ca1af);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .event-card {
      width: 100%;
      max-width: 500px;
      padding: 2rem;
      background-color: white;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
    }

    .form-control:focus {
      border-color: #4ca1af;
      box-shadow: none;
    }

    .btn-event {
      background-color: #4ca1af;
      border: none;
    }

    .btn-event:hover {
      background-color: #3b8b9c;
    }

    .form-check-input:checked {
      background-color: #4ca1af;
      border-color: #4ca1af;
    }

    .text-muted {
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <div class="event-card">
    <h4 class="text-center mb-2">Create a New Event</h4>
    <p class="text-center text-muted mb-4">Fill in the details to get started</p>

    <form id="event-form">
      <div class="mb-3">
        <label for="event-name" class="form-label">Event Name</label>
        <input type="text" class="form-control" id="event-name" required placeholder="e.g. Hackathon 2025" />
      </div>

      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label for="event-date" class="form-label">Date</label>
          <input type="date" class="form-control" id="event-date" required />
        </div>
        <div class="col-md-6">
          <label for="event-time" class="form-label">Time</label>
          <input type="time" class="form-control" id="event-time" required />
        </div>
      </div>

      <div class="mb-3">
        <label for="event-duration" class="form-label">Duration</label>
        <input type="text" class="form-control" id="event-duration" placeholder="e.g. 3 hours" required />
      </div>

      <div class="mb-3">
        <label for="event-explanation" class="form-label">Description</label>
        <input type="text" class="form-control" id="event-explanation" placeholder="Brief description..." required />
      </div>

      <div class="mb-3">
        <label class="form-label">Categories</label>
        <div class="d-flex flex-wrap gap-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="technology" name="category" value="technology" />
            <label class="form-check-label" for="technology">Technology</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="sports" name="category" value="sports" />
            <label class="form-check-label" for="sports">Sports</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="music" name="category" value="music" />
            <label class="form-check-label" for="music">Music</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="art" name="category" value="art" />
            <label class="form-check-label" for="art">Art</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="travel" name="category" value="travel" />
            <label class="form-check-label" for="travel">Travel</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="cooking" name="category" value="cooking" />
            <label class="form-check-label" for="cooking">Cooking</label>
          </div>
        </div>
      </div>

      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-event text-white" id="next-btn">Next (1/2)</button>
      </div>

      <div class="text-center">
        <small class="text-muted">Changed your mind? <a href="main.html">Go back</a></small>
      </div>
    </form>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      document.getElementById("next-btn").addEventListener("click", function (event) {
        event.preventDefault();

        const eventOwnerId = sessionStorage.getItem("userId");

        const eventData = {
          eventName: document.getElementById("event-name").value,
          eventDate: document.getElementById("event-date").value,
          eventTime: document.getElementById("event-time").value,
          eventDuration: document.getElementById("event-duration").value,
          eventExplanation: document.getElementById("event-explanation").value,
          eventCategory: Array.from(document.querySelectorAll('input[name="category"]:checked')).map(input => input.value),
          eventOwnerId: eventOwnerId
        };

        localStorage.setItem("eventData", JSON.stringify(eventData));
        window.location.href = "createEvent2.html";
      });
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
