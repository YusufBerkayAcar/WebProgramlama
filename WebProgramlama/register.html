<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(to right, #2c3e50, #4ca1af);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .register-card {
      width: 100%;
      max-width: 450px;
      padding: 2rem;
      background-color: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    .form-control:focus {
      border-color: #4ca1af;
      box-shadow: 0 0 0 0.2rem rgba(76, 161, 175, 0.25);
    }

    .btn-register {
      background-color: #4ca1af;
      border: none;
    }

    .btn-register:hover {
      background-color: #3b8b9c;
    }

    .text-muted a {
      color: #4ca1af;
      text-decoration: none;
    }

    .text-muted a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="register-card">
    <h4 class="text-center mb-4">Sign Up</h4>
    <form>
      <div class="mb-3">
        <label for="name" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="name" placeholder="Your full name" required />
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="mail@example.com" required />
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Your password" required />
      </div>
      <div class="mb-3">
        <label for="confirmPassword" class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="confirmPassword" placeholder="Re-enter your password" required />
      </div>
      <div class="mb-3">
  <label class="form-label">Select Your Interests</label>
  <div class="row">
    <div class="col-4">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" value="technology" id="interestTech">
        <label class="form-check-label" for="interestTech">Technology</label>
      </div>
    </div>
    <div class="col-4">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" value="sports" id="interestSports">
        <label class="form-check-label" for="interestSports">Sports</label>
      </div>
    </div>
    <div class="col-4">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" value="music" id="interestMusic">
        <label class="form-check-label" for="interestMusic">Music</label>
      </div>
    </div>
    <div class="col-4">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" value="art" id="interestArt">
        <label class="form-check-label" for="interestArt">Art</label>
      </div>
    </div>
    <div class="col-4">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" value="travel" id="interestTravel">
        <label class="form-check-label" for="interestTravel">Travel</label>
      </div>
    </div>
    <div class="col-4">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" value="education" id="interestEducation">
        <label class="form-check-label" for="interestEducation">Education</label>
      </div>
    </div>
  </div>
</div>

      <div class="d-grid">
        <button type="submit" class="btn btn-register text-white">Register</button>
      </div>
    </form>
    <p class="mt-3 text-center text-muted">
      Already have an account? <a href="login.html">Login</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
