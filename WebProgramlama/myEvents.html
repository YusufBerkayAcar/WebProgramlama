<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Events - Event Application</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(135deg, #4ca1af, #2c3e50);
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
    }

    .container {
      margin-top: 4rem;
    }

    .title {
      text-align: center;
      margin-bottom: 2rem;
      font-size: 2rem;
      font-weight: bold;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
    }

    .filter-buttons {
      text-align: center;
      margin-bottom: 2rem;
    }
    .filter-buttons button {
      margin: 0 0.5rem;
      padding: 0.5rem 1.2rem;
      border-radius: 50px;
      border: none;
      font-weight: 600;
      transition: all 0.3s ease;
      color: #fff;
      background-color: #4ca1af;
    }
    .filter-buttons button:hover,
    .filter-buttons button.active {
      background-color: #3b8b9c;
    }

    .event-card {
      background-color: #ffffff1a;
      backdrop-filter: blur(8px);
      border-radius: 15px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      color: #fff;
      transition: transform 0.2s ease;
    }

    .event-card:hover {
      transform: scale(1.02);
    }

    .event-card h5 {
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .event-card p {
      margin: 0.25rem 0;
      color: #dce3e6cc;
    }

    .event-card .btn {
      margin-top: 1rem;
    }

    .d-none {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">My Events</div>

    <div class="filter-buttons">
      <button class="btn btn-light" onclick="filterEvents('all')">All</button>
      <button class="btn btn-outline-light" onclick="filterEvents('created')">Created</button>
      <button class="btn btn-outline-light" onclick="filterEvents('joined')">Joined</button>
    </div>

    <!-- Created Event Example -->
    <div class="event-card created">
      <h5>Startup Pitch Night</h5>
      <p><strong>Date:</strong> August 2, 2025</p>
      <p><strong>Location:</strong> San Francisco, CA</p>
      <p><strong>Status:</strong> Organizer</p>
      <button class="btn btn-outline-light btn-sm">Edit Event</button>
      <button class="btn btn-outline-light btn-sm">Chat</button>

    </div>

    <!-- Joined Event Example -->
    <div class="event-card joined">
      <h5>AI Workshop for Beginners</h5>
      <p><strong>Date:</strong> July 10, 2025</p>
      <p><strong>Location:</strong> Online</p>
      <p><strong>Status:</strong> Registered</p>
      <button class="btn btn-outline-light btn-sm">View Details</button>
      <button class="btn btn-outline-light btn-sm">Leave the Event</button>
      <button class="btn btn-outline-light btn-sm">Chat</button>

    </div>

    <!-- Joined Event Example -->
    <div class="event-card joined">
      <h5>Hiking & Wellness Retreat</h5>
      <p><strong>Date:</strong> September 5, 2025</p>
      <p><strong>Location:</strong> Boulder, CO</p>
      <p><strong>Status:</strong> Registered</p>
      <button class="btn btn-outline-light btn-sm">View Details</button>
      <button class="btn btn-outline-light btn-sm">Leave the Event</button>
      <button class="btn btn-outline-light btn-sm">Chat</button>
    </div>
  </div>

  <script>
    function filterEvents(type) {
      const allCards = document.querySelectorAll('.event-card');
      allCards.forEach(card => {
        card.classList.remove('d-none');
        if (type === 'created' && !card.classList.contains('created')) {
          card.classList.add('d-none');
        }
        if (type === 'joined' && !card.classList.contains('joined')) {
          card.classList.add('d-none');
        }
      });
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
