<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile Setup</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(to right, #2c3e50, #4ca1af);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .profile-card {
      background: #fff;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      max-width: 500px;
      width: 100%;
    }

    .upload-label {
      display: inline-block;
      cursor: pointer;
      background-color: #4ca1af;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      margin-top: 10px;
      text-align: center;
    }

    #photo-upload {
      display: none;
    }

    #photo-preview {
      display: none;
      width: 100px;
      height: 100px;
      object-fit: cover;
      margin-top: 15px;
      border-radius: 8px;
    }

    .btn-submit {
      background-color: #4ca1af;
      border: none;
    }

    .btn-submit:hover {
      background-color: #3b8b9c;
    }
  </style>
</head>
<body>

  <div class="profile-card">
    <h4 class="text-center mb-4">Profile Setup</h4>
    <form id="profileForm">
      
      <!-- Photo Upload -->
      <div class="mb-3 text-center">
        <label for="photo-upload" class="upload-label">📷 Choose a Photo</label>
        <input type="file" id="photo-upload" accept="image/*">
        <br>
        <img id="photo-preview" src="" alt="Photo Preview">
      </div>

      <!-- Interests in 3 Columns -->
      <div class="mb-3">
        <label class="form-label">Select Your Interests:</label>
        <div class="row">
          <div class="col-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="interestTech" name="interests" value="technology">
              <label class="form-check-label" for="interestTech">Technology</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="interestMusic" name="interests" value="music">
              <label class="form-check-label" for="interestMusic">Music</label>
            </div>
          </div>
          <div class="col-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="interestSports" name="interests" value="sports">
              <label class="form-check-label" for="interestSports">Sports</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="interestArt" name="interests" value="art">
              <label class="form-check-label" for="interestArt">Art</label>
            </div>
          </div>
          <div class="col-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="interestTravel" name="interests" value="travel">
              <label class="form-check-label" for="interestTravel">Travel</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="interestCooking" name="interests" value="cooking">
              <label class="form-check-label" for="interestCooking">Cooking</label>
            </div>
          </div>
        </div>
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-submit text-white">Submit</button>
      </div>
    </form>
  </div>

  <script>
    // Fotoğraf önizleme
    const photoInput = document.getElementById('photo-upload');
    const photoPreview = document.getElementById('photo-preview');

    photoInput.addEventListener('change', function () {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          photoPreview.src = e.target.result;
          photoPreview.style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    });
  </script>

</body>
</html>
