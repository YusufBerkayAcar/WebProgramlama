<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Edit User - Admin Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(135deg, #2c3e50, #4ca1af);
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }
    .edit-container {
      background: #ffffff22;
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 2.5rem 3rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }
    h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      text-shadow: 0 1px 5px rgba(0,0,0,0.3);
    }
    label {
      font-weight: 600;
      margin-top: 1rem;
      display: block;
    }
    input[type="text"],
    input[type="email"],
    input[type="date"],
    input[disabled] {
      width: 100%;
      padding: 0.75rem 1rem;
      margin-top: 0.4rem;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      outline: none;
      box-shadow: 0 0 8px rgba(255,255,255,0.15);
      background-color: #ffffff33;
      color: #fff;
    }
    input::placeholder {
      color: #dce3e6cc;
    }
    .btn-save {
      margin-top: 2rem;
      width: 100%;
      background-color: #4ca1af;
      border: none;
      padding: 12px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.1rem;
      color: #fff;
      transition: background-color 0.3s ease;
      cursor: pointer;
    }
    .btn-save:hover {
      background-color: #3b8b9c;
    }
    .btn-cancel {
      margin-top: 0.75rem;
      width: 100%;
      background-color: transparent;
      border: 2px solid #4ca1af;
      padding: 10px;
      border-radius: 50px;
      font-weight: 600;
      color: #4ca1af;
      cursor: pointer;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    .btn-cancel:hover {
      background-color: #4ca1af;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="edit-container">
    <h2>Edit User</h2>
    <form id="editUserForm">
      <label for="user-id-input"><strong>User ID:</strong></label>
      <input type="text" id="user-id-input" placeholder="User ID" disabled />

      <label for="user-name-input"><strong>User Name:</strong></label>
      <input type="text" id="user-name-input" placeholder="User Name" required />

      <label for="user-email"><strong>User Email:</strong></label>
      <input type="email" id="user-email" placeholder="User Email" required />

      <label for="user-password"><strong>User Password:</strong></label>
      <input type="text" id="user-password" placeholder="User Password" />

      <label for="user-birth"><strong>User Birth:</strong></label>
      <input type="date" id="user-birth" placeholder="User Birth" />

      <label for="user-number"><strong>User Number:</strong></label>
      <input type="text" id="user-number" placeholder="User Number" />

      <button type="submit" class="btn-save">Save Changes</button>
      <button type="button" class="btn-cancel" onclick="cancelEdit()">Cancel</button>
    </form>
  </div>

  <script>
    // Simulate pre-filling user data (örnek amaçlı)
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      document.getElementById('user-id-input').value = params.get('id') || '12345';
      document.getElementById('user-name-input').value = params.get('name') || 'Jane Doe';
      document.getElementById('user-email').value = params.get('email') || 'jane@example.com';
      document.getElementById('user-password').value = ''; // boş bırakıyoruz güvenlik için
      document.getElementById('user-birth').value = params.get('birth') || '1990-01-01';
      document.getElementById('user-number').value = params.get('number') || '+1234567890';
    });

    document.getElementById('editUserForm').addEventListener('submit', (e) => {
      e.preventDefault();

      // Kullanıcı bilgilerini al
      const userData = {
        id: document.getElementById('user-id-input').value,
        name: document.getElementById('user-name-input').value.trim(),
        email: document.getElementById('user-email').value.trim(),
        password: document.getElementById('user-password').value.trim(),
        birth: document.getElementById('user-birth').value,
        number: document.getElementById('user-number').value.trim()
      };

      if (!userData.name || !userData.email) {
        alert('Please fill in all required fields (Name and Email).');
        return;
      }

      // TODO: Backend API çağrısı ile güncelleme yapılabilir
      alert(`User updated successfully!\n
ID: ${userData.id}
Name: ${userData.name}
Email: ${userData.email}
Password: ${userData.password ? '[Provided]' : '[Not Changed]'}
Birth Date: ${userData.birth}
Number: ${userData.number}`);

      // İşlem sonrası admin sayfasına dön
      window.location.href = 'admin.html';
    });

    function cancelEdit() {
      window.location.href = 'admin.html';
    }
  </script>
</body>
</html>
